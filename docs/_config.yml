# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.github_repo }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: TeszCore
description: Docs for TeszCore
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://mrtesz.github.io/TeszCore" # the base hostname & protocol for your site
repository: MrTesz/TeszCore # for github-metadata

remote_theme: just-the-docs/just-the-docs
color_scheme: dark

toc:
  enabled: false

defaults:
  - scope:
      path: "" # an empty string here means all files in the project
      type: "pages"
    values:
      layout: "default"

exclude:
  # from https://github.com/jekyll/jekyll/blob/master/lib/site_template/_config.yml:
  - _assets/
  - README.md

# Enable or disable heading anchors
heading_anchors: true

aux_links_new_tab: true
aux_links: []

# Sort order for navigation links
# nav_sort: case_insensitive # default, equivalent to nil
nav_sort: case_insensitive # Capital letters sorted before lowercase

# External navigation links
nav_external_links: []

# Footer
back_to_top: true
back_to_top_text: "Back to top"

last_edit_timestamp: false # show or hide edit time - page must have `last_modified_date` defined in the frontmatter
last_edit_time_format: "%b %e %Y at %I:%M %p" # uses ruby's time format: https://ruby-doc.org/stdlib-2.7.0/libdoc/time/rdoc/Time.html

# When commented out, callouts_level defaults to quiet for the light scheme, and loud for dark
# callouts_level: quiet # or loud
callouts:
  highlight:
    color: yellow
  important:
    title: Info
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
  red:
    title: ""
    color: red
  blue:
    title: ""
    color: blue

enable_copy_code_button: true

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jekyll-sitemap
  - jekyll-remote-theme

# Show navigation error report
nav_error_report: true
nav_enabled: true

liquid:
  error_mode: strict
  strict_filters: true

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Enable or disable the site search
# Supports true (default) or false
search_enabled: true
search:
  # Maximum amount of previews per search result
  # Default: 3
  previews: 3
  # Maximum amount of words to display before a matched word in the preview
  # Default: 5
  preview_words_before: 5
  # Maximum amount of words to display after a matched word in the preview
  # Default: 10
  preview_words_after: 5
  tokenizer_separator: /[\s/]+/
  # Focus the search input by pressing `ctrl + focus_shortcut_key` (or `cmd + focus_shortcut_key` on macOS)
  focus_shortcut_key: "f"

# By default, consuming the theme as a gem leaves mermaid disabled; it is opt-in
mermaid:
  version: "9.1.6"

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false
  # ignore:
  #   envs: all
